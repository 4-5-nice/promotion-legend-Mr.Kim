<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>회원가입 - 지금부터 김부장</title>
    <link rel="stylesheet" th:href="@{/css/usercss/signup.css}">
</head>
<body>
<header class="top-nav">
    <div class="nav-container">
        <div class="brand-title">지금부터 김부장</div>
        <div class="nav-actions">
            <span class="text-muted">이미 회원이신가요?</span>
            <a th:href="@{/auth/login}" class="btn-dark-sm">로그인</a>
        </div>
    </div>
</header>

<div class="signup-wrapper">
    <div class="bg-blur blur-gold"></div>
    <div class="bg-blur blur-blue"></div>

    <div class="signup-card">
        <div class="brand-panel">
            <div class="brand-content">
                <span class="badge-gold">EXECUTIVE PATHWAY</span>
                <h2>김부장과 함께<br>당신의 가치를 증명하세요</h2>
                <p class="brand-desc">단순한 학습을 넘어서, 상위 리더들의 사고방식과 실전 전략을 익히는 성장 경험을 제공합니다.</p>
            </div>

            <div class="brand-stats">
                <div class="stat-item">
                    <div class="stat-icon"></div>
                    <div class="stat-text">
                        <strong>수강 만족도 98%</strong>
                        <span>데이터로 검증된 실전형 커리큘럼</span>
                    </div>
                </div>
                <div class="brand-footer">
                    LEGENDARY DIRECTOR KIM | EST. 2024
                </div>
            </div>
        </div>

        <div class="form-panel">
            <div class="form-header">
                <h2>신규 회원 등록</h2>
                <p>교육 과정을 시작할 수 있도록 기본 정보를 입력해 주세요.</p>
            </div>

            <form th:action="@{/user/signup}" th:object="${signupDTO}" method="post" class="signup-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div th:if="${message}" class="input-group">
                    <span th:text="${message}" style="color: #b42318;"></span>
                </div>

                <div class="input-group">
                    <label>NAME</label>
                    <input type="text" th:field="*{name}" placeholder="이름" required>
                </div>

                <div class="input-group">
                    <label>DATE OF BIRTH</label>
                    <input type="date" th:field="*{birthDate}" required>
                </div>

                <div class="input-group">
                    <label>EMAIL ADDRESS</label>
                    <input type="email" th:field="*{email}" placeholder="회사 또는 개인 이메일" required>
                </div>

                <div class="input-group">
                    <label>PASSWORD</label>
                    <input type="password" th:field="*{password}" placeholder="비밀번호 설정" required>
                </div>

                <div class="input-group">
                    <label>SECURITY QUESTION</label>
                    <select th:field="*{identifyQuestion}" required>
                        <option value="">질문을 선택해 주세요</option>
                        <option value="가장 좋아하는 물건은?">가장 좋아하는 물건은?</option>
                        <option value="졸업한 초등학교 이름은?">졸업한 초등학교 이름은?</option>
                        <option value="어릴 적 별명은?">어릴 적 별명은?</option>
                    </select>
                </div>

                <div class="input-group">
                    <label>SECURITY ANSWER</label>
                    <input type="text" th:field="*{identifyAnswer}" placeholder="답변을 입력해 주세요" required>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">
                        본인은 <a href="#">개인정보 처리방침</a> 및 <a href="#">이용약관</a>에 동의하고, 지금부터 김부장의 회원으로 가입합니다.
                    </label>
                </div>

                <button type="submit" class="btn-submit">회원가입</button>
            </form>
        </div>
    </div>
</div>

<footer class="bottom-footer">
    © 2026 지금부터 김부장 Education Group. All Rights Reserved.
</footer>
</body>
</html>
