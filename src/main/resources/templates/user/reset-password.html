<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>진급전설 - 비밀번호 재설정</title>
    <link rel="stylesheet" th:href="@{/css/usercss/login.css}">
    <style>
        .error-msg { color: #EF4444; font-size: 12px; margin-top: 5px; display: none; }
        .success-msg { color: #10B981; font-size: 12px; margin-top: 5px; display: none; }
    </style>
</head>
<body>
<div class="login-container">
    <div class="login-box">
        <div class="login-header">
            <h2>비밀번호 재설정</h2>
            <p>가입 시 등록한 보안 정보를 입력해주세요.</p>
        </div>

        <div th:if="${message}" class="alert-message" style="color: red; margin-bottom: 15px; text-align: center;">
            <strong th:text="${message}"></strong>
        </div>

        <form th:action="@{/auth/reset-password}" method="post" id="resetForm" onsubmit="return validatePassword()">

            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="email" required placeholder="가입하신 이메일 입력">
            </div>

            <div class="form-group">
                <label for="identifyQuestion">보안 질문</label>
                <select id="identifyQuestion" name="identifyQuestion" required>
                    <option value="" disabled selected>질문을 선택해 주세요</option>
                    <option value="가장 좋아하는 물건은?">가장 좋아하는 물건은?</option>
                    <option value="졸업한 초등학교 이름은?">졸업한 초등학교 이름은?</option>
                    <option value="어릴 적 별명은?">어릴 적 별명은?</option>
                </select>
            </div>

            <div class="form-group">
                <label for="identifyAnswer">보안 답변</label>
                <input type="text" id="identifyAnswer" name="identifyAnswer" required placeholder="답변을 입력해 주세요">
            </div>

            <div class="form-group">
                <label for="newPassword">새로운 비밀번호</label>
                <input type="password" id="newPassword" name="newPassword" required placeholder="변경할 비밀번호 입력">
            </div>

            <div class="form-group">
                <label for="confirmPassword">비밀번호 확인</label>
                <input type="password" id="confirmPassword" name="confirmPassword" required placeholder="비밀번호 다시 입력" onkeyup="checkPasswordMatch()">
                <div id="passwordError" class="error-msg">비밀번호가 일치하지 않습니다.</div>
                <div id="passwordSuccess" class="success-msg">비밀번호가 일치합니다.</div>
            </div>

            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 15px;">비밀번호 변경하기</button>

            <div class="login-footer" style="margin-top: 20px; text-align: center;">
                <a th:href="@{/auth/login}" class="link">로그인 화면으로 돌아가기</a>
            </div>
        </form>
    </div>
</div>

<script>
    // 키보드를 칠 때마다 실시간으로 비밀번호 일치 여부 확인
    function checkPasswordMatch() {
        const pwd = document.getElementById("newPassword").value;
        const confirmPwd = document.getElementById("confirmPassword").value;
        const errorMsg = document.getElementById("passwordError");
        const successMsg = document.getElementById("passwordSuccess");

        if (confirmPwd === "") {
            errorMsg.style.display = "none";
            successMsg.style.display = "none";
            return;
        }

        if (pwd !== confirmPwd) {
            errorMsg.style.display = "block";
            successMsg.style.display = "none";
        } else {
            errorMsg.style.display = "none";
            successMsg.style.display = "block";
        }
    }

    // 최종 폼 전송 전(버튼 클릭 시) 한 번 더 검증
    function validatePassword() {
        const pwd = document.getElementById("newPassword").value;
        const confirmPwd = document.getElementById("confirmPassword").value;

        if (pwd !== confirmPwd) {
            alert("비밀번호가 일치하지 않습니다. 다시 확인해주세요.");
            document.getElementById("confirmPassword").focus();
            return false; // form 전송 중단
        }
        return true; // form 전송
    }
</script>
</body>
</html>
