<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세조회</title>
    <link rel="stylesheet" href="/css/board/freeboard-detail.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <div class="profile-box">
            <div class="profile-img"></div>
            <h3>김부장</h3>
            <p>SENIOR DIRECTOR</p>
        </div>

        <button type="button" onclick="location.href='/user/mypage/myInfo'">마이페이지</button>
        <button type="button" onclick="location.href='/user/lectures'">전체 강의</button>
        <button type="button" onclick="location.href='/questionboard/user/questionboard'">문제 게시판</button>
        <button type="button" class="active" onclick="location.href='/freeboard/user/freeboard'">자유 게시판</button>
    </aside>

    <main class="content">

        <header class="top-header">
            <button type="button" class="home-title-btn" onclick="location.href='/'">
                진급전설 김부장
            </button>
        </header>

        <section class="detail-wrap">

            <button type="button" class="back-btn" onclick="location.href='/freeboard/user/freeboard'">
                ← 목록으로
            </button>

            <div class="detail-top">
                <p class="category">INSIGHTS & DEBATE</p>

                <div class="title-row">
                    <h1 th:text="${post.title}">게시글 제목</h1>

                    <div class="action-area" th:if="${post.mine}">
                        <button type="button"
                                th:onclick="|location.href='/freeboard/user/freeboard/${post.id}/freeboard-write'|">
                            수정
                        </button>

                        <form th:action="@{/freeboard/user/freeboard/{postId}/freeboard-delete(postId=${post.id})}"
                              method="post"
                              style="display:inline;">
                            <button type="submit" class="delete-btn">삭제</button>
                        </form>
                    </div>
                </div>

                <div class="meta-box">
                    <div class="author-icon">♙</div>
                    <div>
                        <strong th:text="${post.authorName}">작성자</strong>
                        <p th:text="${post.createdAt}">2026.04.19 13:00</p>
                    </div>

                    <div class="post-stats">
                        <span>👁 <span th:text="${post.viewCount}">0</span></span>
                        <span>💬 <span th:text="${#lists.size(comments)}">0</span></span>
                    </div>
                </div>
            </div>

            <article class="post-content">
                <p th:text="${post.content}">게시글 내용</p>
            </article>

            <section class="comment-section">
                <h3>의견 공유 <span th:text="${#lists.size(comments)}">0</span></h3>

                <form th:action="@{/freeboard/user/freeboard/{postId}/comments(postId=${post.id})}"
                      method="post"
                      class="comment-write">

                    <textarea name="content"
                              placeholder="동료의 의견에 존중을 담아 댓글을 작성해주세요."
                              maxlength="200"
                              required></textarea>

                    <div class="comment-bottom">
                        <button type="submit">등록하기</button>
                    </div>
                </form>

                <div class="comment-list">
                    <div class="comment-item" th:each="comment : ${comments}">
                        <div class="comment-avatar"></div>

                        <div class="comment-body">
                            <strong th:text="${comment.authorName}">작성자</strong>
                            <span class="time" th:text="${comment.createdAt}">2026.04.19 13:00</span>
                            <p th:text="${comment.content}">댓글 내용</p>

                            <div class="comment-action" th:if="${comment.mine}">
                                <button type="button"
                                        th:onclick="|toggleEditForm(${comment.id})|">
                                    수정
                                </button>

                                <form th:action="@{/freeboard/user/freeboard/comments/{commentId}/delete(commentId=${comment.id})}"
                                      method="post"
                                      style="display:inline;">
                                    <button type="submit">삭제</button>
                                </form>
                            </div>

                            <div th:if="${comment.mine}"
                                 th:id="'edit-form-' + ${comment.id}"
                                 style="display:none; margin-top:10px;">

                                <form th:action="@{/freeboard/user/freeboard/comments/{commentId}/edit(commentId=${comment.id})}"
                                      method="post">

                                    <textarea name="content"
                                              maxlength="200"
                                              required
                                              th:text="${comment.content}"></textarea>

                                    <button type="submit">수정완료</button>
                                </form>
                            </div>
                        </div>
                    </div>

                    <div th:if="${#lists.isEmpty(comments)}" class="comment-empty">
                        아직 등록된 댓글이 없습니다.
                    </div>
                </div>

            </section>

        </section>

    </main>

</div>

<script>
    function toggleEditForm(commentId) {
        const form = document.getElementById('edit-form-' + commentId);

        if (form.style.display === 'none' || form.style.display === '') {
            form.style.display = 'block';
        } else {
            form.style.display = 'none';
        }
    }
</script>

</body>
</html>
