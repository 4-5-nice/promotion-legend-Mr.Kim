<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>게시글 상세조회</title>
    <link rel="stylesheet" href="/css/board/freeboard-detail.css">
</head>
<body>

<div class="layout">

    <aside class="sidebar">
        <div class="profile-box">
            <div class="profile-img"></div>
            <h3>김부장</h3>
            <p>SENIOR DIRECTOR</p>
        </div>

        <button type="button" onclick="location.href='/user/mypage/myInfo'">마이페이지</button>
        <button type="button" onclick="location.href='/user/lectures'">전체 강의</button>
        <button type="button" onclick="location.href='/questionboard/user/questionboard'">문제 게시판</button>
        <button type="button" class="active" onclick="location.href='/freeboard/user/freeboard'">자유 게시판</button>
    </aside>

    <main class="content">

        <header class="top-header">
            <button type="button" class="home-title-btn" onclick="location.href='/'">
                진급전설 김부장
            </button>
        </header>

        <section class="detail-wrap">

            <button type="button" class="back-btn" onclick="location.href='/freeboard/user/freeboard'">
                ← 목록으로
            </button>

            <div class="detail-top">
                <p class="category">INSIGHTS & DEBATE</p>

                <div class="title-row">
                    <h1 id="postTitle" th:text="${post.title}">
                        보고서 작성할 때 '그' 폰트 쓰는게 진짜 중요할까요?
                    </h1>

                    <div class="action-area" th:if="${post.mine}">
                        <button type="button"
                                th:onclick="|location.href='/freeboard/user/freeboard/${post.id}/edit'|">
                            수정
                        </button>

                        <button type="button" class="delete-btn">
                            삭제
                        </button>
                    </div>
                </div>

                <div class="meta-box">
                    <div class="author-icon">♙</div>
                    <div>
                        <strong id="authorName" th:text="${post.authorName}">박사원 (영업3팀)</strong>
                        <p id="createdAt" th:text="${post.createdAt}">2024.05.20 11:05</p>
                    </div>

                    <div class="post-stats">
                        <span>👁 <span id="viewCount" th:text="${post.viewCount}">1,245</span></span>
                        <span>💬 <span id="commentCount">18</span></span>
                    </div>
                </div>
            </div>

            <article class="post-content" id="postContent">
                <p th:text="${post.content}">
                    안녕하십니까, 영업3팀 박사원입니다.
                </p>
            </article>

            <div class="tag-area">
                <span>#비즈니스스킬</span>
                <span>#보고서작성</span>
                <span>#타이포그래피</span>
            </div>

            <section class="comment-section">
                <h3>의견 공유 <span id="commentTitleCount">18</span></h3>

                <form th:action="@{/freeboard/user/freeboard/{postId}/comments(postId=${post.id})}"
                      method="post"
                      class="comment-write">

                    <textarea name="content"
                        placeholder="동료의 의견에 존중을 담아 댓글을 작성해주세요."
                        maxlength="200"
                        required></textarea>

                    <div class="comment-bottom">
                        <button type="submit">등록하기</button>
                    </div>
                </form>

                <div class="comment-list">
                    <div class="comment-item" th:each="comment : ${comments}">
                        <div class="comment-avatar"></div>
                        <div class="comment-body">
                            <strong th:text="${comment.authorName}">작성자</strong>
                            <span class="time" th:text="${comment.createdAt}">2026.04.17 13:00</span>
                            <p th:text="${comment.content}">댓글 내용</p>
                        </div>
                    </div>

                    <div th:if="${#lists.isEmpty(comments)}" class="comment-empty">
                        아직 등록된 댓글이 없습니다.
                    </div>
                </div>

            </section>

        </section>

    </main>

</div>

</body>
</html>
